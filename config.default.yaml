# retrofox.nvim config
#
# :RetrofoxEdit   — open this file
# :RetrofoxApply  — re-apply after changes
# :ThemePicker    — switch colorschemes
#
# Requires: Neovim >= 0.12.0

modules:
  go: false
  cpp: false
  python: false
  typescript: false
  rust: false
  java: false
  docker: false
  json: false
  markdown: false
  copilot: false
  competitive_programming: false

# Tokyo Night and Gruvbox are always available.
# Add extra families to the list, pick the active variant.
# active/active_label are managed by :ThemePicker.
colorschemes:
  families: []
  active: "tokyonight-night"
  active_label: "Night"

editor:
  tab_width: 4
  relative_numbers: true
  format_on_save: true
