# retrofox.nvim config
#
# :RetrofoxEdit   — open this file
# :RetrofoxApply  — re-apply after changes
# :ThemePicker    — switch colorschemes
#
# Requires: Neovim >= 0.12.0

modules:
  go: false
  cpp: false
  python: false
  typescript: false
  rust: false
  java: false
  docker: false
  json: false
  markdown: false
  copilot: false
  competitive_programming: false
  lean: false

editor:
  tab_width: 4
  relative_numbers: true
  format_on_save: true
  # Tokyo Night and Gruvbox are always available.
  # Available families: catppuccin, kanagawa, nightfox, rose-pine, github-nvim-theme, everforest, gruvbox-material, onedark, cyberdream, oxocarbon
  # Add extra families to the list. active is colorscheme:variant.
  colorschemes:
    families: []
    active: "tokyonight-night:Night"
