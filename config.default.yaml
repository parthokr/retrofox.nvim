# retrofox.nvim config
#
# :RetrofoxEdit   — open this file
# :RetrofoxApply  — re-apply after changes
# :ThemePicker    — switch colorschemes
#
# Requires: Neovim >= 0.12.0

modules:
  go: false
  cpp: false
  python: false
  typescript: false
  rust: false
  java: false
  docker: false
  json: false
  markdown: false
  copilot: false
  competitive_programming: false

editor:
  tab_width: 4
  relative_numbers: true
  format_on_save: true

# Theme families in `list` are opt-in.
# Tokyo Night and Gruvbox stay available even when the list is empty.
# `active` and `active_label` are managed by :ThemePicker.
appearance:
  colorscheme:
    list: []
    active: "tokyonight-night"
    active_label: "Night"
